name: Build Redmi 9C Kernel (Final Success)

on:
  workflow_dispatch:

jobs:
  build:
    # السر هنا: استخدام 18.04 لأنها تحتوي على كل المكتبات القديمة تلقائياً
    runs-on: ubuntu-18.04

    steps:
      - name: Install Build Essentials
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential bc libssl-dev libncurses5-dev flex bison git python device-tree-compiler libncurses5
          # ملاحظة: في 18.04 اسم الحزمة هو python وليس python3 لضمان التوافق

      - name: Clone Kernel Source
        run: |
          git clone --depth 1 https://github.com/MiCode/Xiaomi_Kernel_OpenSource.git -b dandelion-q-oss kernel_source

      - name: Clone Toolchain Inside Source
        run: |
          cd kernel_source
          # تنزيل المترجم داخل مجلد السورس مباشرة لإلغاء أي خطأ في المسار
          git clone --depth 1 https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/aarch64/aarch64-linux-android-4.9 tc64

      - name: Build Kernel
        run: |
          cd kernel_source
          export ARCH=arm64
          # استخدام المسار المحلي الكامل لضمان رؤية المترجم
          export CROSS_COMPILE=$(pwd)/tc64/bin/aarch64-linux-android-
          
          # إصلاح أخطاء ملفات الـ scripts القديمة
          sed -i 's/^YYLTYPE yylloc;/extern YYLTYPE yylloc;/g' scripts/dtc/dtc-lexer.l
          sed -i 's/^YYLTYPE yylloc;/extern YYLTYPE yylloc;/g' scripts/dtc/dtc-lexer.lex.c_shipped
          
          make dandelion_defconfig
          
          # إضافة -fcommon ضرورية جداً لتجاوز أخطاء الـ net والـ drivers
          make -j$(nproc) KCFLAGS="-fcommon -w" Image.gz DTC_EXT=dtc

      - name: Upload Kernel Image
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Image_Redmi9C_Final
          path: kernel_source/arch/arm64/boot/Image.gz
