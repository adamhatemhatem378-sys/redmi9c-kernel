name: Build Redmi 9C Kernel (dandelion)

on:
  workflow_dispatch: # Allows manual trigger from the Actions tab

jobs:
  build-kernel:
    runs-on: ubuntu-latest

    steps:
      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential bc gcc-aarch64-linux-gnu libssl-dev libncurses5-dev flex bison

      - name: Clone Kernel Source
        run: |
          git clone --depth=1 https://github.com/MiCode/Xiaomi_Kernel_OpenSource.git -b dandelion-p-oss kernel_source

      - name: Configure Kernel Drivers
        run: |
          cd kernel_source
          # Enable the requested wireless drivers in the defconfig
          echo "CONFIG_RT2X00=y" >> arch/arm64/configs/dandelion_user_defconfig
          echo "CONFIG_RT2800USB=y" >> arch/arm64/configs/dandelion_user_defconfig
          echo "CONFIG_RT2800USB_RT33XX=y" >> arch/arm64/configs/dandelion_user_defconfig
          echo "CONFIG_RT2800USB_RT35XX=y" >> arch/arm64/configs/dandelion_user_defconfig
          echo "CONFIG_RT2800USB_RT53XX=y" >> arch/arm64/configs/dandelion_user_defconfig
          echo "CONFIG_RT2800USB_RT55XX=y" >> arch/arm64/configs/dandelion_user_defconfig

      - name: Start Compilation
        run: |
          cd kernel_source
          export ARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-
          
          # Initialize the configuration
          make dandelion_user_defconfig
          
          # Compile the kernel (using all available CPU cores)
          make -j$(nproc)

      - name: Check Output and Upload
        uses: actions/upload-artifact@v4
        with:
          name: Dandelion-Kernel-Image
          path: kernel_source/arch/arm64/boot/Image.gz-dtb
