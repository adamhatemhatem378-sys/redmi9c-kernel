name: Build Redmi 9C Kernel (Absolute Fix)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    # استخدام حاوية Ubuntu 18.04 جاهزة عشان المكتبات القديمة تكون موجودة
    container:
      image: ubuntu:18.04

    steps:
      - name: Install System Dependencies
        run: |
          apt-get update
          apt-get install -y build-essential bc libssl-dev libncurses5-dev flex bison git python device-tree-compiler libncurses5 wget
          # في 18.04 بايثون القديم هو الأساس، وده اللي الكيرنل عاوزه

      - name: Clone Everything
        run: |
          # تنزيل السورس والمترجم في أماكن ثابتة
          git clone --depth 1 https://github.com/MiCode/Xiaomi_Kernel_OpenSource.git -b dandelion-q-oss kernel_source
          git clone --depth 1 https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/aarch64/aarch64-linux-android-4.9 tc64
          git clone --depth 1 https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/arm/arm-linux-androideabi-4.9 tc32

      - name: Build Kernel
        run: |
          cd kernel_source
          export ARCH=arm64
          # استخدام المسارات المطلقة (Absolute Paths)
          export CROSS_COMPILE=$GITHUB_WORKSPACE/tc64/bin/aarch64-linux-android-
          export CROSS_COMPILE_ARM32=$GITHUB_WORKSPACE/tc32/bin/arm-linux-androideabi-
          
          # إصلاح أخطاء الـ scripts قبل البناء
          sed -i 's/^YYLTYPE yylloc;/extern YYLTYPE yylloc;/g' scripts/dtc/dtc-lexer.l
          sed -i 's/^YYLTYPE yylloc;/extern YYLTYPE yylloc;/g' scripts/dtc/dtc-lexer.lex.c_shipped
          
          make dandelion_defconfig
          
          # البناء النهائي مع تجاوز أخطاء الشبكة المعروفة
          make -j$(nproc) \
            CROSS_COMPILE=$CROSS_COMPILE \
            CROSS_COMPILE_ARM32=$CROSS_COMPILE_ARM32 \
            KCFLAGS="-fcommon -w" \
            Image.gz DTC_EXT=dtc

      - name: Upload Kernel
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Final_Kernel_Redmi9C
          path: kernel_source/arch/arm64/boot/Image.gz
