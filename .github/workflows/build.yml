name: Build Redmi 9C Kernel (Clang Final Fix)

on:
  workflow_dispatch:

jobs:
  build-kernel:
    runs-on: ubuntu-latest

    steps:
      - name: Install Dependencies
* **sudo apt-get update**
* **sudo apt-get install -y build-essential bc gcc-aarch64-linux-gnu libssl-dev libncurses5-dev flex bison git python3 device-tree-compiler clang lld**
* **sudo ln -sf /usr/bin/python3 /usr/bin/python**

      - name: Clone Kernel Source
* **git clone --depth 1 https://github.com/MiCode/Xiaomi_Kernel_OpenSource.git -b dandelion-q-oss kernel_source**

      - name: Fix Source Code
        run: |
          cd kernel_source
          sed -i 's/^YYLTYPE yylloc;/extern YYLTYPE yylloc;/g' scripts/dtc/dtc-lexer.l
          sed -i 's/^YYLTYPE yylloc;/extern YYLTYPE yylloc;/g' scripts/dtc/dtc-lexer.lex.c_shipped
          echo "YYLTYPE yylloc;" >> scripts/dtc/dtc-lexer.lex.c_shipped

      - name: Build Kernel with Clang
        run: |
          cd kernel_source
          export ARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-
          
          CONF_FILE=$(find arch/arm64/configs/ -name "*dandelion*" | head -n 1 | xargs basename)
          make ARCH=arm64 $CONF_FILE
          
          # Fix Stack Protector issue for Clang
          sed -i 's/CONFIG_CC_STACKPROTECTOR_STRONG=y/# CONFIG_CC_STACKPROTECTOR_STRONG is not set/g' .config
          sed -i 's/CONFIG_CC_STACKPROTECTOR_REGULAR=y/# CONFIG_CC_STACKPROTECTOR_REGULAR is not set/g' .config

          make ARCH=arm64 -j$(nproc) \
            CC=clang \
            CLANG_TRIPLE=aarch64-linux-gnu- \
            HOSTCFLAGS="-fcommon" \
            KCFLAGS="-fcommon -w -Wno-error" \
            Image.gz DTC_EXT=dtc

      - name: Upload Kernel
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Dandelion-Kernel-Success
* **path: kernel_source/arch/arm64/boot/Image.gz**
