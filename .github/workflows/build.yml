name: Build Redmi 9C Kernel (dandelion)

on:
  workflow_dispatch:

jobs:
  build-kernel:
    runs-on: ubuntu-latest

    steps:
      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential bc gcc-aarch64-linux-gnu libssl-dev libncurses5-dev flex bison git python3

      - name: Clone Kernel Source
        run: |
          git config --global http.postBuffer 524288000
          git clone --depth 1 https://github.com/MiCode/Xiaomi_Kernel_OpenSource.git -b dandelion-q-oss kernel_source

      - name: Configure Kernel Drivers
        run: |
          cd kernel_source
          # Enable WiFi drivers
          echo "CONFIG_RT2X00=y" >> arch/arm64/configs/dandelion_user_defconfig
          echo "CONFIG_RT2800USB=y" >> arch/arm64/configs/dandelion_user_defconfig

      - name: Start Compilation
        run: |
          cd kernel_source
          export ARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-
          
          # Initialize config
          make dandelion_user_defconfig
          
          # Build with DTC_EXT to skip internal dtbo issues
          make -j$(nproc) DTC_EXT=dtc
          
          # Create the Image.gz-dtb if it doesn't merge automatically
          cat arch/arm64/boot/Image.gz arch/arm64/boot/dts/mediatek/mt6765.dtb > arch/arm64/boot/Image.gz-dtb || true

      - name: Upload Kernel Image
        uses: actions/upload-artifact@v4
        with:
          name: Dandelion-Kernel
          path: kernel_source/arch/arm64/boot/Image.gz*
