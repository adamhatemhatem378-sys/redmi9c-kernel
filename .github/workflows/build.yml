name: Build Redmi 9C Kernel (Legacy GCC Fix)

on:
  workflow_dispatch:

jobs:
  build-kernel:
    runs-on: ubuntu-latest

    steps:
      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential bc libssl-dev libncurses5-dev flex bison git python3 device-tree-compiler
          sudo ln -sf /usr/bin/python3 /usr/bin/python

      - name: Clone Toolchain (The Key)
        run: |
          git clone --depth 1 https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/aarch64/aarch64-linux-android-4.9 toolchain

      - name: Clone Kernel Source
        run: |
          git clone --depth 1 https://github.com/MiCode/Xiaomi_Kernel_OpenSource.git -b dandelion-q-oss kernel_source

      - name: Fix Source Code
        run: |
          cd kernel_source
          sed -i 's/^YYLTYPE yylloc;/extern YYLTYPE yylloc;/g' scripts/dtc/dtc-lexer.l
          sed -i 's/^YYLTYPE yylloc;/extern YYLTYPE yylloc;/g' scripts/dtc/dtc-lexer.lex.c_shipped
          echo "YYLTYPE yylloc;" >> scripts/dtc/dtc-lexer.lex.c_shipped

      - name: Build Kernel (Legacy Mode)
        run: |
          cd kernel_source
          export ARCH=arm64
          export CROSS_COMPILE=$GITHUB_WORKSPACE/toolchain/bin/aarch64-linux-android-
          
          # Load config
          CONF_FILE=$(find arch/arm64/configs/ -name "*dandelion*" | head -n 1 | xargs basename)
          make ARCH=arm64 $CONF_FILE
          
          # Build with old GCC flags
          make ARCH=arm64 -j$(nproc) \
            KCFLAGS="-fcommon -w -Wno-error" \
            Image.gz DTC_EXT=dtc

      - name: Upload Kernel
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Dandelion-Kernel-Legacy
          path: kernel_source/arch/arm64/boot/Image.gz
