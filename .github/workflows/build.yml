name: Build Redmi 9C Kernel (System Final)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04 # بيئة مستقرة وسريعة جداً

    steps:
      - name: Setup System
        run: |
          sudo apt-get update
          # تثبيت المترجمات الرسمية مباشرة من مستودعات Ubuntu
          sudo apt-get install -y build-essential bc libssl-dev flex bison git python3 device-tree-compiler gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi
          sudo ln -sf /usr/bin/python3 /usr/bin/python

      - name: Clone Kernel Source
        run: |
          # تنزيل السورس فقط (بدون مترجمات خارجية) لتوفير الوقت
          git clone --depth 1 https://github.com/MiCode/Xiaomi_Kernel_OpenSource.git -b dandelion-q-oss kernel_source

      - name: Fix Kernel Scripts
        run: |
          cd kernel_source
          # إصلاح أخطاء التوافق مع الأنظمة الحديثة
          sed -i 's/^YYLTYPE yylloc;/extern YYLTYPE yylloc;/g' scripts/dtc/dtc-lexer.l
          sed -i 's/^YYLTYPE yylloc;/extern YYLTYPE yylloc;/g' scripts/dtc/dtc-lexer.lex.c_shipped

      - name: Build Kernel
        run: |
          cd kernel_source
          export ARCH=arm64
          # استخدام مترجمات النظام المثبتة في /usr/bin/ تلقائياً
          export CROSS_COMPILE=aarch64-linux-gnu-
          export CROSS_COMPILE_ARM32=arm-linux-gnueabi-
          
          make dandelion_defconfig
          
          # البناء مع معالجة أخطاء التعريفات المكررة (fcommon)
          make -j$(nproc) \
            CROSS_COMPILE=$CROSS_COMPILE \
            CROSS_COMPILE_ARM32=$CROSS_COMPILE_ARM32 \
            KCFLAGS="-fcommon -w" \
            DTC_EXT=dtc \
            Image.gz

      - name: Upload Kernel Image
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Kernel_Redmi9C_SystemGCC
          path: kernel_source/arch/arm64/boot/Image.gz
