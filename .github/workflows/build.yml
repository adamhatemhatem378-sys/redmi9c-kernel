name: Build Redmi 9C Kernel (dandelion)

on:
  workflow_dispatch:

jobs:
  build-kernel:
    runs-on: ubuntu-latest

    steps:
      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential bc gcc-aarch64-linux-gnu libssl-dev libncurses5-dev flex bison git

      - name: Clone Kernel Source
        run: |
          git config --global http.postBuffer 524288000
          # Changed branch name to dandelion-q-oss
          git clone --depth 1 https://github.com/MiCode/Xiaomi_Kernel_OpenSource.git -b dandelion-q-oss kernel_source

      - name: Configure Kernel Drivers
        run: |
          cd kernel_source
          # Enable WiFi drivers in defconfig
          # Note: Check if the filename is dandelion_user_defconfig or dandelion_defconfig
          echo "CONFIG_RT2X00=y" >> arch/arm64/configs/dandelion_user_defconfig
          echo "CONFIG_RT2800USB=y" >> arch/arm64/configs/dandelion_user_defconfig

      - name: Start Compilation
        run: |
          cd kernel_source
          export ARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-
          
          # If this step fails, we might need to change the defconfig name
          make dandelion_user_defconfig
          make -j$(nproc)

      - name: Upload Kernel Image
        uses: actions/upload-artifact@v4
        with:
          name: Dandelion-Kernel
          path: kernel_source/arch/arm64/boot/Image.gz-dtb
          
