name: Build Redmi 9C Kernel (Verified Fix)

on:
  workflow_dispatch:

jobs:
  build-kernel:
    runs-on: ubuntu-latest

    steps:
      - name: Install Dependencies
        run: |
          sudo apt-get update
          # إضافة مستودع المكتبات القديمة عشان libncurses5
          sudo add-apt-repository universe
          sudo apt-get install -y build-essential bc libssl-dev libncurses5-dev flex bison git python3 device-tree-compiler libncurses5 libtinfo5
          sudo ln -sf /usr/bin/python3 /usr/bin/python

      - name: Clone Toolchain (The Legacy Way)
        run: |
          # ده المترجم اللي بيخلص الحوار ده مع شاومي
          git clone --depth 1 https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/aarch64/aarch64-linux-android-4.9 $GITHUB_WORKSPACE/toolchain

      - name: Clone Kernel Source
        run: |
          git clone --depth 1 https://github.com/MiCode/Xiaomi_Kernel_OpenSource.git -b dandelion-q-oss kernel_source

      - name: Fix DTC Lexer
        run: |
          cd kernel_source
          sed -i 's/^YYLTYPE yylloc;/extern YYLTYPE yylloc;/g' scripts/dtc/dtc-lexer.l
          sed -i 's/^YYLTYPE yylloc;/extern YYLTYPE yylloc;/g' scripts/dtc/dtc-lexer.lex.c_shipped
          echo "YYLTYPE yylloc;" >> scripts/dtc/dtc-lexer.lex.c_shipped

      - name: Build Kernel
        run: |
          cd kernel_source
          export ARCH=arm64
          export CROSS_COMPILE=$GITHUB_WORKSPACE/toolchain/bin/aarch64-linux-android-
          
          make ARCH=arm64 dandelion_defconfig
          
          # سر النجاح: -fcommon لتجاهل تكرار التعريفات في ملفات الـ net
          make ARCH=arm64 -j$(nproc) \
            CROSS_COMPILE=$CROSS_COMPILE \
            KCFLAGS="-fcommon -w -Wno-error" \
            Image.gz DTC_EXT=dtc

      - name: Upload Kernel
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Kernel-Redmi9C-Finished
          path: kernel_source/arch/arm64/boot/Image.gz
