name: Build Redmi 9C Kernel (dandelion)

on:
  workflow_dispatch:

jobs:
  build-kernel:
    runs-on: ubuntu-latest

    steps:
      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential bc gcc-aarch64-linux-gnu libssl-dev libncurses5-dev flex bison git python3 device-tree-compiler

      - name: Clone Kernel Source
        run: |
          git config --global http.postBuffer 524288000
          git clone --depth 1 https://github.com/MiCode/Xiaomi_Kernel_OpenSource.git -b dandelion-q-oss kernel_source

      - name: Configure Kernel Drivers
        run: |
          cd kernel_source
          # Clean any previous failed attempts
          make clean
          # Use the core defconfig
          make dandelion_user_defconfig
          # Enable WiFi drivers manually in the .config file directly
          echo "CONFIG_RT2X00=y" >> .config
          echo "CONFIG_RT2800USB=y" >> .config

      - name: Start Compilation (Root Fix)
        run: |
          cd kernel_source
          export ARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-
          
          # The FIX: Build only the Image.gz and ignore dtbs checks for now
          make -j$(nproc) Image.gz
          
          # After Image.gz is done, we try to build dtbs separately without the 'check'
          make -j$(nproc) dtbs || echo "DTBS failed but we have the Image"

      - name: Upload Kernel Image
        uses: actions/upload-artifact@v4
        with:
          name: Dandelion-Kernel-Result
          path: |
            kernel_source/arch/arm64/boot/Image.gz
            kernel_source/arch/arm64/boot/dts/mediatek/*.dtb
