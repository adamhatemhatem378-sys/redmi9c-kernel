name: Build Redmi 9C (Docker Fix)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest # أي نسخة مش هتفرق لأننا هنبني جوه Docker

    steps:
      - name: Clone Source
        run: |
          git clone --depth 1 https://github.com/MiCode/Xiaomi_Kernel_OpenSource.git -b dandelion-q-oss kernel_source

      - name: Build in Docker Container
        run: |
          # هنستخدم حاوية فيها بيئة بناء أندرويد كاملة وجاهزة
          docker run --rm -v $(pwd):/work -w /work/kernel_source \
          fr3akyphantom/droid-builder:latest /bin/bash -c "
            # إصلاحات الكود الإلزامية
            sed -i 's/^YYLTYPE yylloc;/extern YYLTYPE yylloc;/g' scripts/dtc/dtc-lexer.l
            sed -i 's/^YYLTYPE yylloc;/extern YYLTYPE yylloc;/g' scripts/dtc/dtc-lexer.lex.c_shipped
            
            # تحميل المترجم جوه الحاوية
            git clone --depth 1 https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/aarch64/aarch64-linux-android-4.9 /toolchain
            
            export ARCH=arm64
            export CROSS_COMPILE=/toolchain/bin/aarch64-linux-android-
            
            make dandelion_defconfig
            
            # تعطيل الحماية اللي وقفتنا في كل الصور اللي فاتت
            scripts/config --disable CONFIG_CC_STACKPROTECTOR_STRONG
            
            make -j$(nproc) KCFLAGS='-fcommon -w' Image.gz
          "

      - name: Upload Kernel
        uses: actions/upload-artifact@v4
        with:
          name: Kernel_Redmi9C_Docker
          path: kernel_source/arch/arm64/boot/Image.gz
