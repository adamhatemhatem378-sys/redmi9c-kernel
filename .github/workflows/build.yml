name: Build Redmi 9C Kernel (LLD Fix)

on:
  workflow_dispatch:

jobs:
  build-kernel:
    runs-on: ubuntu-latest

    steps:
      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential bc gcc-aarch64-linux-gnu libssl-dev libncurses5-dev flex bison git python3 device-tree-compiler lld clang
          sudo ln -sf /usr/bin/python3 /usr/bin/python

      - name: Clone Kernel Source
        run: |
          git clone --depth 1 https://github.com/MiCode/Xiaomi_Kernel_OpenSource.git -b dandelion-q-oss kernel_source

      - name: Force Fix Source
        run: |
          cd kernel_source
          sed -i 's/^YYLTYPE yylloc;/extern YYLTYPE yylloc;/g' scripts/dtc/dtc-lexer.l
          sed -i 's/^YYLTYPE yylloc;/extern YYLTYPE yylloc;/g' scripts/dtc/dtc-lexer.lex.c_shipped
          echo "YYLTYPE yylloc;" >> scripts/dtc/dtc-lexer.lex.c_shipped

      - name: Build Kernel (The Final Solution)
        run: |
          cd kernel_source
          export ARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-
          
          # Load config
          CONF_FILE=$(find arch/arm64/configs/ -name "*dandelion*" | head -n 1 | xargs basename)
          make ARCH=arm64 $CONF_FILE
          
          # Use LLD as the linker to solve the 'net/built-in.o' error
          make ARCH=arm64 -j$(nproc) \
            LD=ld.lld \
            HOSTCFLAGS="-fcommon -w" \
            HOSTCXXFLAGS="-fcommon -w" \
            KCFLAGS="-fcommon -w -Wno-error -fno-stack-protector -fpermissive" \
            Image.gz DTC_EXT=dtc

      - name: Upload Kernel Image
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Dandelion-Kernel-Success
          path: kernel_source/arch/arm64/boot/Image.gz
