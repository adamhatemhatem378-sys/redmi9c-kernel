name: Build Redmi 9C Kernel (Final Fix)

on:
  workflow_dispatch:

jobs:
  build-kernel:
    runs-on: ubuntu-latest

    steps:
      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential bc gcc-aarch64-linux-gnu libssl-dev libncurses5-dev flex bison git python3 device-tree-compiler
          sudo ln -sf /usr/bin/python3 /usr/bin/python

      - name: Clone Kernel Source
        run: |
          git clone --depth 1 https://github.com/MiCode/Xiaomi_Kernel_OpenSource.git -b dandelion-q-oss kernel_source

      - name: Fix yylloc and GCC 10 Compatibility
        run: |
          cd kernel_source
          # Definitive fix for yylloc errors
          sed -i 's/^YYLTYPE yylloc;/extern YYLTYPE yylloc;/g' scripts/dtc/dtc-lexer.l
          sed -i 's/^YYLTYPE yylloc;/extern YYLTYPE yylloc;/g' scripts/dtc/dtc-lexer.lex.c_shipped
          echo "YYLTYPE yylloc;" >> scripts/dtc/dtc-lexer.lex.c_shipped

      - name: Build Kernel
        run: |
          cd kernel_source
          export ARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-
          
          # Clean build environment
          make ARCH=arm64 mrproper
          
          # Load default config
          CONF_FILE=$(find arch/arm64/configs/ -name "*dandelion*" | head -n 1 | xargs basename)
          make ARCH=arm64 $CONF_FILE
          
          # The Magic Command: Build and ignore non-critical errors + force host common flags
          make ARCH=arm64 -j$(nproc) Image.gz HOSTCFLAGS="-fcommon" HOSTCXXFLAGS="-fcommon" KCFLAGS="-fcommon"

      - name: Upload Kernel
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Dandelion-Kernel-Output
          path: kernel_source/arch/arm64/boot/Image.gz
