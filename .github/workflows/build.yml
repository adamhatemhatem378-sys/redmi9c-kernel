name: Build Redmi 9C Kernel (Proton Clang)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest # أسرع سيرفرات متاحة

    steps:
      - name: Install Build Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential bc libssl-dev flex bison git python3 device-tree-compiler

      - name: Clone Source & Proton Clang
        run: |
          # تنزيل سورس الكيرنل
          git clone --depth 1 https://github.com/MiCode/Xiaomi_Kernel_OpenSource.git -b dandelion-q-oss kernel_source
          # تنزيل مترجم Proton Clang (أسرع وأخف)
          git clone --depth 1 https://github.com/kdrag0n/proton-clang.git clang

      - name: Build Kernel
        run: |
          cd kernel_source
          # إصلاح ملفات الـ scripts
          sed -i 's/^YYLTYPE yylloc;/extern YYLTYPE yylloc;/g' scripts/dtc/dtc-lexer.l
          sed -i 's/^YYLTYPE yylloc;/extern YYLTYPE yylloc;/g' scripts/dtc/dtc-lexer.lex.c_shipped
          
          export PATH=$(pwd)/../clang/bin:$PATH
          export ARCH=arm64
          export SUBARCH=arm64
          
          # إعدادات البناء باستخدام Clang
          make dandelion_defconfig
          make -j$(nproc) \
            CC=clang \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CROSS_COMPILE_ARM32=arm-linux-gnueabi- \
            NM=llvm-nm \
            OBJCOPY=llvm-objcopy \
            OBJDUMP=llvm-objdump \
            STRIP=llvm-strip \
            KCFLAGS="-fcommon -w" \
            Image.gz DTC_EXT=dtc

      - name: Upload Kernel
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Kernel_Proton_Redmi9C
          path: kernel_source/arch/arm64/boot/Image.gz
