name: Build Redmi 9C Kernel (Android 11 Success)

on:
  workflow_dispatch:

jobs:
  build-kernel:
    runs-on: ubuntu-latest

    steps:
      - name: Install Build Essentials
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential bc libssl-dev flex bison git python3 zip gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi libncurses-dev dtc

      - name: Clone Kernel Source
        run: |
          git clone --depth 1 https://github.com/MiCode/Xiaomi_Kernel_OpenSource.git -b dandelion-r-oss kernel_source

      - name: Clone Proton Clang
        run: |
          git clone --depth 1 https://github.com/kdrag0n/proton-clang.git clang

      - name: Build Kernel
        run: |
          cd kernel_source
          export PATH=$GITHUB_WORKSPACE/clang/bin:$PATH
          export ARCH=arm64
          export SUBARCH=arm64
          
          # إعداد الكروس كومبايلر
          make O=out ARCH=arm64 dandelion_defconfig
          
          # البناء باستخدام Clang مع تجاوز تحذيرات الأمان القديمة
          make -j$(nproc) O=out \
              ARCH=arm64 \
              CC=clang \
              CROSS_COMPILE=aarch64-linux-gnu- \
              CROSS_COMPILE_ARM32=arm-linux-gnueabi- \
              CLANG_TRIPLE=aarch64-linux-gnu- \
              KCFLAGS="-w -fcommon -Wno-error" \
              Image.gz DTC_EXT=dtc

      - name: Upload Kernel Image
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Dandelion-Kernel-A11
          path: kernel_source/out/arch/arm64/boot/Image.gz
