name: Build Redmi 9C Kernel (Android 11 Final Fix)

on:
  workflow_dispatch:

jobs:
  build:
    # استخدام 22.04 عشان نضمن وجود المكتبات الأساسية
    runs-on: ubuntu-22.04 

    steps:
      - name: Setup Environment
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential bc libssl-dev libncurses5-dev flex bison git python3 device-tree-compiler libncurses5 lib32z1
          sudo ln -sf /usr/bin/python3 /usr/bin/python

      - name: Download GCC Toolchains
        run: |
          # هنزل المترجمات في الـ HOME عشان المسار يبقى سهل ومضمون
          git clone --depth 1 https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/aarch64/aarch64-linux-android-4.9 $HOME/tc64
          git clone --depth 1 https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/arm/arm-linux-androideabi-4.9 $HOME/tc32

      - name: Clone Kernel Source
        run: |
          # استخدام الفرع اللي اشتغل معاك فعلياً
          git clone --depth 1 https://github.com/MiCode/Xiaomi_Kernel_OpenSource.git -b dandelion-q-oss kernel_source

      - name: Build Kernel
        run: |
          cd kernel_source
          export ARCH=arm64
          # استخدام مسارات HOME بيحل مشكلة "No such file" اللي ظهرتلك
          export CROSS_COMPILE=$HOME/tc64/bin/aarch64-linux-android-
          export CROSS_COMPILE_ARM32=$HOME/tc32/bin/arm-linux-androideabi-
          
          # إصلاح ملفات الـ scripts اللي بتوقف البناء
          sed -i 's/^YYLTYPE yylloc;/extern YYLTYPE yylloc;/g' scripts/dtc/dtc-lexer.l
          sed -i 's/^YYLTYPE yylloc;/extern YYLTYPE yylloc;/g' scripts/dtc/dtc-lexer.lex.c_shipped
          
          # التحميل وبدء البناء
          make dandelion_defconfig
          # إضافة -fcommon لحل مشكلة أخطاء ملفات الـ net اللي ظهرتلك قبل كدة
          make -j$(nproc) KCFLAGS="-fcommon -w -Wno-error" Image.gz DTC_EXT=dtc

      - name: Upload Kernel Artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Kernel_Redmi9C_A11
          path: kernel_source/arch/arm64/boot/Image.gz
