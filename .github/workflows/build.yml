name: Build Redmi 9C Kernel (Speed Fix)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-20.04 # النسخة دي سريعة وبدء التشغيل فيها فوري

    steps:
      - name: Install Essentials
        run: |
          sudo apt-get update
          # تثبيت المكتبات اللي بتخلي المترجم "ينطق" ويشتغل
          sudo apt-get install -y build-essential bc libssl-dev libncurses5-dev flex bison git python3 device-tree-compiler libncurses5 libtinfo5
          sudo ln -sf /usr/bin/python3 /usr/bin/python

      - name: Fast Clone
        run: |
          # تحميل السورس والمترجم في خطوة واحدة لتقليل الوقت
          git clone --depth 1 https://github.com/MiCode/Xiaomi_Kernel_OpenSource.git -b dandelion-q-oss kernel_source
          git clone --depth 1 https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/aarch64/aarch64-linux-android-4.9 $HOME/tc64

      - name: Build
        run: |
          cd kernel_source
          # إصلاح ملفات الـ scripts عشان تقبل الـ Build في البيئة الجديدة
          sed -i 's/^YYLTYPE yylloc;/extern YYLTYPE yylloc;/g' scripts/dtc/dtc-lexer.l
          sed -i 's/^YYLTYPE yylloc;/extern YYLTYPE yylloc;/g' scripts/dtc/dtc-lexer.lex.c_shipped
          
          export ARCH=arm64
          export CROSS_COMPILE=$HOME/tc64/bin/aarch64-linux-android-
          
          make dandelion_defconfig
          # إضافة -fcommon هي اللي هتعدي مرحلة الـ drivers والـ net اللي وقفتنا زمان
          make -j$(nproc) KCFLAGS="-fcommon -w" Image.gz DTC_EXT=dtc

      - name: Upload Result
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Kernel_Dandelion_A11
          path: kernel_source/arch/arm64/boot/Image.gz
