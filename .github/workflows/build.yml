name: Build Redmi 9C Kernel (Final Success)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04 # نستخدم النسخة المتاحة والمدعومة

    steps:
      - name: Setup System & Libraries
        run: |
          sudo apt-get update
          # تثبيت المكتبات اللي كانت ناقصة في صورك القديمة وتسببت في فشل الـ GCC
          sudo apt-get install -y build-essential bc libssl-dev libncurses5-dev flex bison git python3 device-tree-compiler libncurses5 libtinfo5
          sudo ln -sf /usr/bin/python3 /usr/bin/python

      - name: Clone Everything Locally
        run: |
          # تنزيل السورس والمترجم في نفس الفولدر لضمان المسارات
          git clone --depth 1 https://github.com/MiCode/Xiaomi_Kernel_OpenSource.git -b dandelion-q-oss kernel_source
          cd kernel_source
          git clone --depth 1 https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/aarch64/aarch64-linux-android-4.9 tc64
          git clone --depth 1 https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/arm/arm-linux-androideabi-4.9 tc32

      - name: Hard-Fix Scripts
        run: |
          cd kernel_source
          # حل مشكلة الـ Lexer اللي ظهرت في صورك الأولى
          sed -i 's/^YYLTYPE yylloc;/extern YYLTYPE yylloc;/g' scripts/dtc/dtc-lexer.l
          sed -i 's/^YYLTYPE yylloc;/extern YYLTYPE yylloc;/g' scripts/dtc/dtc-lexer.lex.c_shipped

      - name: Build Time
        run: |
          cd kernel_source
          export ARCH=arm64
          # تعريف المسار بشكل مباشر ومطلق (Absolute Path)
          export CROSS_COMPILE=$(pwd)/tc64/bin/aarch64-linux-android-
          export CROSS_COMPILE_ARM32=$(pwd)/tc32/bin/arm-linux-androideabi-
          
          make dandelion_defconfig
          # إضافة -fcommon ضرورية لتخطي أخطاء تكرار التعريفات في كود شاومي
          make -j$(nproc) KCFLAGS="-fcommon -w" Image.gz DTC_EXT=dtc

      - name: Upload Finished Kernel
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Kernel_Redmi9C_A11
          path: kernel_source/arch/arm64/boot/Image.gz
