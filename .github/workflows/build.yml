name: Build Redmi 9C Kernel (A11 Success Path)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04 

    steps:
      - name: Setup Environment
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential bc libssl-dev libncurses5-dev flex bison git python3 device-tree-compiler libncurses5
          sudo ln -sf /usr/bin/python3 /usr/bin/python

      - name: Download GCC Toolchains
        run: |
          # تنزيل المترجمات في مسارات واضحة جداً
          git clone --depth 1 https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/aarch64/aarch64-linux-android-4.9 $GITHUB_WORKSPACE/tc64
          git clone --depth 1 https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/arm/arm-linux-androideabi-4.9 $GITHUB_WORKSPACE/tc32

      - name: Clone Kernel Source
        run: |
          git clone --depth 1 https://github.com/MiCode/Xiaomi_Kernel_OpenSource.git -b dandelion-q-oss kernel_source

      - name: Build Kernel
        run: |
          cd kernel_source
          export ARCH=arm64
          # استخدام المسار المطلق $GITHUB_WORKSPACE بيمنع خطأ No such file
          export CROSS_COMPILE=$GITHUB_WORKSPACE/tc64/bin/aarch64-linux-android-
          export CROSS_COMPILE_ARM32=$GITHUB_WORKSPACE/tc32/bin/arm-linux-androideabi-
          
          # إصلاح ملفات السكريبتات القديمة
          sed -i 's/^YYLTYPE yylloc;/extern YYLTYPE yylloc;/g' scripts/dtc/dtc-lexer.l
          sed -i 's/^YYLTYPE yylloc;/extern YYLTYPE yylloc;/g' scripts/dtc/dtc-lexer.lex.c_shipped
          
          # بدء البناء
          make dandelion_defconfig
          # إضافة -fcommon عشان نعدي الـ Error اللي في ملفات الشبكة (السطر 1758)
          make -j$(nproc) KCFLAGS="-fcommon -w -Wno-error" Image.gz DTC_EXT=dtc

      - name: Upload Kernel
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Kernel_Dandelion_A11_Final
          path: kernel_source/arch/arm64/boot/Image.gz
